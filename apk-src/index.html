<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>BitHabit</title>
  <style>
    :root {
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --accent: #A78BFA;
      --bg: #0F0A2E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh; height: 100dvh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 星空背景 ── */
    .stars {
      position: fixed; inset: 0; pointer-events: none;
    }
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.5); }
    }

    /* ── 光晕 ── */
    .glow-1, .glow-2 {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(80px); opacity: 0.3;
    }
    .glow-1 {
      width: 280px; height: 280px;
      background: var(--primary);
      top: -100px; right: -60px;
      animation: floatGlow 8s ease-in-out infinite;
    }
    .glow-2 {
      width: 200px; height: 200px;
      background: var(--accent);
      bottom: -60px; left: -40px;
      animation: floatGlow 6s ease-in-out infinite reverse;
    }
    @keyframes floatGlow {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.15); }
      66% { transform: translate(-15px, 20px) scale(0.9); }
    }

    /* ── 主图标 ── */
    .hero-icon {
      position: relative; z-index: 2;
      width: 100px; height: 100px;
      margin-bottom: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.04));
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      box-shadow: 0 16px 48px rgba(99,102,241,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: iconFloat 4s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.03); }
    }

    /* ── 标题区 ── */
    .title-section {
      position: relative; z-index: 2;
      text-align: center; margin-bottom: 16px;
    }
    .app-name {
      font-size: 32px; font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .app-tagline {
      font-size: 13px; color: rgba(255,255,255,0.5);
      letter-spacing: 2px; font-weight: 500;
    }

    /* ── 进度指示器 ── */
    .progress-section {
      position: relative; z-index: 2;
      margin-bottom: 40px; text-align: center;
    }
    .progress-dots {
      display: flex; gap: 8px; justify-content: center;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(1); background: rgba(255,255,255,0.2); }
      40% { opacity: 1; transform: scale(1.5); background: var(--accent); }
    }

    .loading-text {
      margin-top: 14px;
      color: rgba(255,255,255,0.4);
      font-size: 12px; letter-spacing: 1px;
    }

    /* ── 底部装饰线 ── */
    .bottom-line {
      position: fixed; bottom: 40px; z-index: 2;
      width: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      border-radius: 1px;
    }

    /* ── 粒子 ── */
    .particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--accent);
      animation: rise var(--rise-d) linear infinite;
      animation-delay: var(--rise-delay);
      opacity: 0;
    }
    @keyframes rise {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0; }
      100% { transform: translateY(-400px) translateX(var(--drift)) scale(0); opacity: 0; }
    }

    /* ── 响应式 ── */
    @media (max-width: 360px) {
      .hero-icon { width: 80px; height: 80px; margin-bottom: 20px; font-size: 40px; }
      .app-name { font-size: 26px; }
      .app-tagline { font-size: 12px; }
    }
  </style>
</head>
<body>
  <!-- 星空 -->
  <div class="stars" id="stars"></div>

  <!-- 光晕 -->
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- 粒子 -->
  <div class="particles" id="particles"></div>

  <!-- 主图标 -->
  <div class="hero-icon">📚</div>

  <!-- 标题 -->
  <div class="title-section">
    <div class="app-name">BitHabit</div>
    <div class="app-tagline">暑假作业 · 计划助手</div>
  </div>

  <!-- 进度 -->
  <div class="progress-section">
    <div class="progress-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="loading-text">正在加载</div>
  </div>

  <!-- 底部装饰 -->
  <div class="bottom-line"></div>

  <script>
    // ── 生成星空 ──
    (function() {
      var starsEl = document.getElementById('stars');
      var frag = document.createDocumentFragment();
      for (var i = 0; i < 50; i++) {
        var star = document.createElement('div');
        star.className = 'star';
        var size = Math.random() * 2 + 1;
        star.style.cssText =
          'left:' + Math.random() * 100 + '%;' +
          'top:' + Math.random() * 100 + '%;' +
          'width:' + size + 'px;' +
          'height:' + size + 'px;' +
          '--d:' + (Math.random() * 3 + 2) + 's;' +
          '--delay:' + (Math.random() * 3) + 's';
        frag.appendChild(star);
      }
      starsEl.appendChild(frag);
    })();

    // ── 生成上升粒子 ──
    (function() {
      var particlesEl = document.getElementById('particles');
      var frag = document.createDocumentFragment();
      for (var i = 0; i < 15; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText =
          'left:' + (Math.random() * 90 + 5) + '%;' +
          'bottom:0;' +
          '--rise-d:' + (Math.random() * 4 + 3) + 's;' +
          '--rise-delay:' + (Math.random() * 5) + 's;' +
          '--drift:' + (Math.random() * 40 - 20) + 'px';
        frag.appendChild(p);
      }
      particlesEl.appendChild(frag);
    })();

    // ── 加载完成后跳转 ──
    // 给动画 2 秒展示时间
    setTimeout(function() {
      window.location.replace('https://bithabit.dpdns.org');
    }, 2000);
  </script>
</body>
</html>
